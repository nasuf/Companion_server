services:
  server:
    image: companion-server:deploy
    build:
      context: .
    container_name: companion-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      neo4j:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  neo4j:
    image: neo4j:5-community
    container_name: companion-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-companion_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data

volumes:
  neo4jdata:
