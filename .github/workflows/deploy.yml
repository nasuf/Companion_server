name: Deploy Companion Server to RackNerd

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ vars.VPS_PORT }}
          source: "app,jobs,prisma,scripts,pyproject.toml,Dockerfile,docker-compose.deploy.yml,.dockerignore,.env.example"
          target: "/app/companion-server"

      - name: Deploy server stack on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ vars.VPS_PORT }}
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            if ! docker compose version >/dev/null 2>&1; then
              apt-get update
              apt-get install -y docker-compose-plugin
            fi

            mkdir -p /app/companion-server
            cd /app/companion-server

            cat > .env <<EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            NEO4J_URI=bolt://neo4j:7687
            NEO4J_USER=neo4j
            NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}
            OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL }}
            DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
            DASHSCOPE_BASE_URL=${{ vars.DASHSCOPE_BASE_URL }}
            DASHSCOPE_ENABLE_THINKING=${{ vars.DASHSCOPE_ENABLE_THINKING }}
            ONLINE_MODEL=${{ vars.ONLINE_MODEL }}
            LOCAL_CHAT_MODEL=${{ vars.LOCAL_CHAT_MODEL }}
            LOCAL_SMALL_MODEL=${{ vars.LOCAL_SMALL_MODEL }}
            REMOTE_CHAT_MODEL=${{ vars.REMOTE_CHAT_MODEL }}
            REMOTE_SMALL_MODEL=${{ vars.REMOTE_SMALL_MODEL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            LANGSMITH_TRACING=${{ vars.LANGSMITH_TRACING }}
            LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
            LANGSMITH_ORG_ID=${{ secrets.LANGSMITH_ORG_ID }}
            LANGSMITH_PROJECT_ID=${{ secrets.LANGSMITH_PROJECT_ID }}
            EOF

            docker compose -f docker-compose.deploy.yml up -d --build --remove-orphans
